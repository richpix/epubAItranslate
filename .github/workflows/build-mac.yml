name: Build Tauri App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Permiso necesario para crear el Release en GitHub

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Quita la advertencia de Node.js
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Build Tauri for Mac
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }} 
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: 'Descarga el DMG o instalador para Mac en los assets de esta versión.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
